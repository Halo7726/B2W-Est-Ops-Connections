$kind: http-request
name: GET /MaintenanceRequestComment
description: Get a paginated collection of comments associated with a single
  MaintenanceRequest.
url: "{{BaseURL}}/MaintenanceRequestComment"
method: GET
headers:
  ConnectionString: "{{ConnectionString}}"
queryParams:
  - key: $top
    value: "100"
    disabled: true
    description: OData limit
  - key: $skip
    value: "0"
    disabled: true
    description: OData offset
  - key: $filter
    value: startswith(Name,'A')
    disabled: true
    description: OData filter
  - key: $orderby
    value: Name asc
    disabled: true
    description: OData sort
  - key: $select
    value: Name
    disabled: true
    description: OData projection
order: 1000
